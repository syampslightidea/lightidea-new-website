<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
body {
  color: #333;
  text-align: center;
  background: "#222";
  margin: 0;
}

ul {
	padding: 0;
}

li {
	list-style: none;
}


main {
	max-width: 1200px;
	margin: 0 auto;
	padding: 50px 0;

	h1 {
		margin-bottom: 50px;
	}
}

.wrapper {
	position: relative;
	

	::before,
	::after {
		position: absolute;
		top: 0;
		z-index: 1;

		content: "";
		display: block;
		width:  20px;
		height: 100%;
	}
	
	&:before {
		left: 0;
		background: linear-gradient(90deg,#222, transparent);
	}
	
	&:after {
		right: 0;
		background: linear-gradient(-90deg,#222, transparent);
	}
}

.items {
	position: relative;
	width: 100%;
	overflow: hidden;
	white-space: nowrap;
	font-size: 0;
	cursor: pointer;
	
	&.active {
		cursor: grab;
	}
}

.item {
	display: inline-block;
	margin-left: 20px;
	user-select: none;

	background: tomato;
	width: 50%;
	height: 130px;
	color:#222;
	font-size: 33px;
	font-weight: bold;
	line-height: 130px;
    opacity:30%;
	
	&:last-child {
		margin-right:  20px;
	}
}
.item.active{
    margin-bottom:150px;
    background-color: yellowgreen;
    opacity:100%;
}

@media screen and (min-width: 500px) {

	.item {
		width: 33%;	
	}
}

@media screen and (min-width: 800px) {

	.item {
        width: 32%;
	}
}

@media screen and (min-width: 1200px) {
	
	.wrapper {
		margin-left: 20px;
	}

	.item {
        width: 32%;
	}
}

    </style>
</head>
<body>
    <main>
        <h1>Slide</h1>
        <div class="wrapper">
        <ul class="items" id="myDIV">
          <li class="item active">0</li>
          <li class="item">1</li>
          <li class="item">2</li>
          <li class="item">3</li>
          <li class="item">4</li>
          <li class="item">5</li>
          <li class="item">6</li>
          <li class="item">7</li>
          <li class="item">8</li>
          <li class="item">9</li>
        </ul>
        </div>
    </main>

        //item slider drag

        let isDown = false;
        let startX;
        let scrollLeft;
        const slider = document.querySelector('.item');
        const end = () => {
            isDown = false;
        slider.classList.remove('active');
        }

        const start = (e) => {
        isDown = true;
        slider.classList.add('active');
        startX = e.pageX || e.touches[0].pageX - slider.offsetLeft;
        scrollLeft = slider.scrollLeft;	
        }

        const move = (e) => {
            if(!isDown) return;

        e.preventDefault();
        const x = e.pageX || e.touches[0].pageX - slider.offsetLeft;
        const dist = (x - startX);
        slider.scrollLeft = scrollLeft - dist;
        }

        
var btns = document.getElementsByClassName("item");
for (var i = 0; i < btns.length; i++) {
  btns[i].addEventListener("click", function() {
  var current = document.getElementsByClassName("active");
  current[0].className = current[0].className.replace(" active", "");
  this.className += " active";
  });
}
    </script>

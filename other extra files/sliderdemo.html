<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
body {
  color: #333;
  text-align: center;
  background:  #222;
  margin: 0;
}

ul {
	padding: 0;
}

li {
	list-style: none;
}


main {
	max-width: 1200px;
	margin: 0 auto;
	padding: 50px 0;

	h1 {
		margin-bottom: 50px;
	}
}

.wrapper {
	position: relative;

	&:before,
	&:after {
		position: absolute;
		top: 0;
		z-index: 1;
		content: "";
		display: block;
		width: 20px;
		height: 100%;
	}
	
	&:before {
		left: 0;
		background: linear-gradient(90deg,  #222, transparent);
	}
	
	&:after {
		right: 0;
		background: linear-gradient(-90deg,  #222, transparent);
	}
}

.witems {
	position: relative;
	width: 100%;
	overflow: hidden;
	white-space: nowrap;
	font-size: 0;
	cursor: pointer;
	
	&.active {
		cursor: grab;
	}
}

.witem {
	display: inline-block;
	margin-left: 10px;
	user-select: none;
	width: 30%;
	height: 130px;
	color:  #222;
	font-size: 33px;
	font-weight: bold;
	line-height: 130px;
	
	&:last-child {
		margin-right: 10px;
	}
}

@media screen and (min-width: 500px) {

	.item {
		width: 33%;	
	}
}

@media screen and (min-width: 800px) {

	.item {
        width: 360px;	
	}
}

@media screen and (min-width: 1200px) {
	
	.wrapper {
		margin-left: -20px;
	}

	.item {
		width: 360px;	
	}
}

.witem{
    border-top-left-radius: 0px;
    border-bottom-left-radius: 0px;
    opacity: 30%;
    margin-top:0px;
    position: relative;
    
    top: 150px;
    transition: top ease 0.5s;
}
.witem img{
    height: 250px;
    width: 350px;
}
.witem.clicked{
    opacity:100%;
    position: relative;
    top:0px;
}

</style>
</head>
<body>
    <div class="wrapper">
        <div class="witems" id="witemsDiv">
          <div class="witem" id="witem1"> <img src="#WORKSPACE_FILES#section4imgleft.png"></div>
          <div class="witem clicked"id="witem2"><img src="#WORKSPACE_FILES#section4img.png" ></div>
          <div class="witem" id="witem3"> <img src="#WORKSPACE_FILES#section4imgright.png" ></div>
          </div>
    </div>    
    <script>
        let isDown = false;
let startX;
let scrollLeft;
const slider = document.querySelector('.witems');

const end = () => {
	isDown = false;
  slider.classList.remove('active');
}

const start = (e) => {
  isDown = true;
  slider.classList.add('active');
  startX = e.pageX || e.touches[0].pageX - slider.offsetLeft;
  scrollLeft = slider.scrollLeft;	
}

const move = (e) => {
	if(!isDown) return;

  e.preventDefault();
  const x = e.pageX || e.touches[0].pageX - slider.offsetLeft;
  const dist = (x - startX);
  slider.scrollLeft = scrollLeft - dist;
}

(() => {
	slider.addEventListener('mousedown', start);
	slider.addEventListener('touchstart', start);

	slider.addEventListener('mousemove', move);
	slider.addEventListener('touchmove', move);

	slider.addEventListener('mouseleave', end);
	slider.addEventListener('mouseup', end);
	slider.addEventListener('touchend', end);
})();

var header = document.getElementById("witemsDiv");
var btns = header.getElementsByClassName("witem");
for (var i = 0; i < btns.length; i++) {
  btns[i].addEventListener("click", function() {
  var current = document.getElementsByClassName("clicked");
  current[0].className = current[0].className.replace(" clicked", "");
  this.className += " clicked";
  });
}
    </script>
</body>
</html>
